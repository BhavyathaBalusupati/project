<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Issue Submission</title>

<style>
body { font-family: Arial; background: #f0f4f7; padding: 30px; }

.container {
width: 500px;
margin: auto;
background: white;
padding: 25px;
border-radius: 8px;
box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

h2 { text-align: center; }

label { font-weight: bold; display:block; margin-top:10px; }

select,input,textarea,button{
width:100%; padding:10px; margin-top:5px;
border-radius:5px; border:1px solid #ccc;
}

textarea{ height:80px; }

button{
background:#2b7cff; color:white; border:none;
margin-top:15px; cursor:pointer;
}

button:hover{ background:#0059d4; }
</style>

</head>

<body>

<div class="container">
<h2>Student Issue Submission</h2>

<form id="issueForm">

<label>Student Name</label>
<input type="text" id="studentName" required>

<label>Roll Number</label>
<input type="text" id="rollNumber" maxlength="10" required>

<label>Lab Name</label>
<input type="text" id="labName" required>

<label>System Number</label>
<input type="text" id="systemNumber" required>

<label>Select Problem</label>
<select id="problemType" required>
<option value="">-- Select a problem --</option>
<option>System not turning on</option>
<option>Software not opening</option>
<option>Network issue</option>
<option>Keyboard/Mouse not working</option>
<option>Slow performance</option>
<option value="Other">Other</option>
</select>

<label id="manualLabel" style="display:none;">Enter Problem</label>
<textarea id="problemManual" style="display:none;"></textarea>

<button type="submit">Submit Issue</button>

</form>
</div>

<!-- ✅ ONLY THIS SCRIPT -->
<script type="module" src="issue.js"></script>

</body>
</html>
