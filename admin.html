<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<style>
body{
    font-family: Arial;
    background:#f2f2f2;
    text-align:center;
    margin:0;
}

/* Header */
h2{
    background:#333;
    color:white;
    padding:15px;
}

/* Button */
.refresh-btn{
    margin-top:15px;
    padding:10px 20px;
    background:#4CAF50;
    color:white;
    border:none;
    cursor:pointer;
    border-radius:5px;
}

.refresh-btn:hover{
    background:#388e3c;
}

/* Table */
table{
    margin:30px auto;
    border-collapse:collapse;
    width:95%;
    background:white;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

th,td{
    border:1px solid #ccc;
    padding:12px;
}

th{
    background:#444;
    color:white;
}

/* Status Colors */
.pending{
    color:red;
    font-weight:bold;
}

.in-progress{
    color:orange;
    font-weight:bold;
}

.resolved{
    color:green;
    font-weight:bold;
}

/* No data */
.no-data{
    padding:20px;
    font-weight:bold;
}

/* Delete Button */
button{
    padding:6px 10px;
    border:none;
    background:red;
    color:white;
    cursor:pointer;
    border-radius:5px;
}

button:hover{
    background:darkred;
}

/* Hide dashboard initially */
#dashboard{
    display:none;
}

/* Access denied message */
#denied{
    margin-top:50px;
    color:red;
    font-size:20px;
    font-weight:bold;
}
</style>

</head>

<body>

<!-- Dashboard Content -->
<div id="dashboard">

<h2>Admin - Lab Issues Dashboard</h2>

<button class="refresh-btn" onclick="loadIssues()">🔄 Refresh</button>

<table id="issueTable">

<tr>
    <th>Reported By</th>
    <th>Lab</th>
    <th>System</th>
    <th>Problem</th>
    <th>Status</th>
    <th>Action</th>
</tr>

</table>

</div>

<!-- Access Denied -->
<div id="denied"></div>

<!-- Firebase Logic -->
<script type="module" src="admin.js"></script>

<!-- Password Script -->
<script>
let password = prompt("Enter Admin Password:");

if(password === "jntuhces"){
    document.getElementById("dashboard").style.display = "block";
}else{
    document.getElementById("denied").innerText = "❌ Access Denied!";
}
</script>

</body>
</html>
