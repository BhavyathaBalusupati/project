<!DOCTYPE html>
<html>
<head>
    <title>Technician - Problem List</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
            background: #f4f4f4;
        }
        .box {
            background: white;
            padding: 20px;
            border-radius: 8px;
            width: 700px;
            margin: auto;
            box-shadow: 0 0 10px gray;
        }
        .problem {
            background: #eef3ff;
            padding: 15px;
            margin-top: 10px;
            border-left: 5px solid #0059d4;
        }
        h2, h3 {
            text-align: center;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Reported Problems</h2>
    <h3>Technician: <span id="techName"></span></h3>

    <div id="problemList"></div>
</div>

<script>
    // Show technician name
    document.getElementById("techName").textContent =
        localStorage.getItem("technician_name") || "Unknown";

    // Retrieve all saved problems
    let list = JSON.parse(localStorage.getItem("problems")) || [];

    let output = "";

    if (list.length === 0) {
        output = "<p>No issues reported yet.</p>";
    } else {
        list.forEach((p, index) => {
            output += `
                <div class="problem">
                    <strong>${index + 1}. ${p.userType} Report</strong><br>
                    <b>Name:</b> ${p.name}<br>
                    ${p.roll ? `<b>Roll:</b> ${p.roll}<br>` : ""}
                    <b>System:</b> ${p.system}<br>
                    <b>Problem:</b> ${p.problem}<br>
                    <b>Time:</b> ${p.time}
                </div>
            `;
        });
    }

    document.getElementById("problemList").innerHTML = output;
</script>

</body>
</html>
