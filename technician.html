<!DOCTYPE html>
<html>
<head>
<title>Lab Technician Panel</title>

<style>
body { font-family: Arial; background: #f4f4f4; padding: 30px; }

.card {
background: white;
padding: 20px;
border-radius: 10px;
width: 900px;
margin: auto;
box-shadow: 0 0 10px gray;
}

table {
width: 100%;
border-collapse: collapse;
margin-top: 15px;
}

th, td {
padding: 10px;
border: 1px solid #ddd;
text-align: center;
}
</style>

</head>
<body>

<h2 style="text-align:center;">Lab Technician Panel</h2>

<div class="card">

<label>Technician Name:</label>
<input type="text" id="techName" placeholder="Enter your name" required style="width:100%; padding:8px;">

<button onclick="loadProblems()" style="width:100%; margin-top:10px; padding:10px;">
Load Problems
</button>

<h3>Reported Problems</h3>

<table id="problemTable">
<tr>
<th>Lab</th>
<th>System</th>
<th>Problem</th>
<th>Status</th>
</tr>
</table>

</div>

<script type="module">

import { db } from "./firebase.js";
import { collection, getDocs, doc, updateDoc } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// ✅ Load problems
window.loadProblems = async () => {

    const techName = document.getElementById("techName").value.trim();

    // 🔴 Make name mandatory
    if (techName === "") {
        alert("⚠ Please enter Technician Name");
        return;
    }

    const table = document.getElementById("problemTable");

    table.innerHTML = `
    <tr>
        <th>Lab</th>
        <th>System</th>
        <th>Problem</th>
        <th>Status</th>
    </tr>
    `;

    try {
        const snapshot = await getDocs(collection(db, "problems"));

        if (snapshot.empty) {
            table.innerHTML += "<tr><td colspan='4'>No problems found</td></tr>";
            return;
        }

        snapshot.forEach((docSnap) => {
            const data = docSnap.data();
            const id = docSnap.id;

            const row = `
            <tr>
                <td>${data.lab || "-"}</td>
                <td>${data.system || "-"}</td>
                <td>${data.problem}</td>

                <td>
                    <select onchange="updateStatus('${id}', this.value)">
                        <option ${data.status==="Pending"?"selected":""}>Pending</option>
                        <option ${data.status==="In Progress"?"selected":""}>In Progress</option>
                        <option ${data.status==="Resolved"?"selected":""}>Resolved</option>
                    </select>
                </td>
            </tr>
            `;

            table.innerHTML += row;
        });

    } catch (error) {
        console.error(error);
        alert("❌ Error loading data");
    }
};

// ✅ Update status
window.updateStatus = async (id, status) => {

    const techName = document.getElementById("techName").value.trim();

    if (techName === "") {
        alert("⚠ Enter Technician Name first");
        return;
    }

    try {
        await updateDoc(doc(db, "problems", id), {
            status: status,
            updatedBy: techName   // 🔥 stores technician name
        });

        alert("✅ Status Updated!");

    } catch (error) {
        console.error(error);
        alert("❌ Error updating status");
    }
};

</script>

</body>
</html>
